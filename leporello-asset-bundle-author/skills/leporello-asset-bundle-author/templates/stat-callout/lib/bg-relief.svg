<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <!--
    Ambient background-media texture for the stat-callout template.
    Illustrative only — an abstract "data relief": a deep broadcast field with a
    soft right-side glow plus a recessed, large-scale bar/column motif that echoes
    the idea of a measured value without depicting any real dataset. Low-contrast,
    low-saturation; meant to sit behind a scrim (direction §5.4). No text, no logos.
  -->
  <defs>
    <radialGradient id="field" cx="74%" cy="40%" r="86%">
      <stop offset="0%"  stop-color="#16202e"/>
      <stop offset="46%" stop-color="#0e151f"/>
      <stop offset="100%" stop-color="#0a0e14"/>
    </radialGradient>
    <linearGradient id="bar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%"  stop-color="rgba(79,179,255,0.00)"/>
      <stop offset="100%" stop-color="rgba(79,179,255,0.16)"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%"  stop-color="rgba(255,178,63,0.00)"/>
      <stop offset="100%" stop-color="rgba(255,178,63,0.14)"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- deep field -->
  <rect x="0" y="0" width="1920" height="1080" fill="url(#field)"/>

  <!-- faint baseline grid, water-line low contrast -->
  <g stroke="#1b2735" stroke-width="2" opacity="0.5">
    <line x1="0" y1="270" x2="1920" y2="270"/>
    <line x1="0" y1="540" x2="1920" y2="540"/>
    <line x1="0" y1="810" x2="1920" y2="810"/>
  </g>
  <g stroke="#16212f" stroke-width="1.5" opacity="0.4">
    <line x1="1180" y1="0" x2="1180" y2="1080"/>
    <line x1="1400" y1="0" x2="1400" y2="1080"/>
    <line x1="1620" y1="0" x2="1620" y2="1080"/>
    <line x1="1840" y1="0" x2="1840" y2="1080"/>
  </g>

  <!-- recessed ascending column motif on the right (the dead-space filler) -->
  <g filter="url(#soft)">
    <rect x="1140" y="700" width="120" height="380" rx="10" fill="url(#bar)"/>
    <rect x="1320" y="600" width="120" height="480" rx="10" fill="url(#bar)"/>
    <rect x="1500" y="470" width="120" height="610" rx="10" fill="url(#bar)"/>
    <rect x="1680" y="320" width="120" height="760" rx="10" fill="url(#bar2)"/>
  </g>

  <!-- a single soft glow node on the leading column, very dim -->
  <circle cx="1740" cy="320" r="9" fill="rgba(255,178,63,0.28)" filter="url(#soft)"/>
</svg>
