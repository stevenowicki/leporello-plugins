<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <!--
    Ambient background-media layer for the narrative-flow template (direction §4 + §5.4).
    A composed "system / process" field: a directional radial wash that lifts the RIGHT
    two-thirds of the frame out of flat black, a diagonal light beam, a clearly-visible
    perspective grid, and a constellation of nodes-and-links concentrated where the
    presenter stands. Contrast is intentionally pushed UP from the first pass (which read
    as near-flat black) so the field reads as composed, not empty — while staying
    low-motion / low-saturation enough to sit behind the mandatory scrim without
    competing with the foreground type. Self-contained (no external deps); the scrim is
    applied on top by the bundle, not baked in here.
  -->
  <defs>
    <!-- Wash centered on the right two-thirds so that side never reads as dead black. -->
    <radialGradient id="wash" cx="66%" cy="40%" r="78%">
      <stop offset="0%"  stop-color="#22324a"/>
      <stop offset="34%" stop-color="#16223200"/>
      <stop offset="34%" stop-color="#162232"/>
      <stop offset="70%" stop-color="#0d141e"/>
      <stop offset="100%" stop-color="#080b11"/>
    </radialGradient>
    <linearGradient id="beam" x1="0.15" y1="-0.1" x2="1" y2="1">
      <stop offset="0%"  stop-color="#4fb3ff" stop-opacity="0.28"/>
      <stop offset="42%" stop-color="#4fb3ff" stop-opacity="0.06"/>
      <stop offset="70%" stop-color="#4fb3ff" stop-opacity="0"/>
    </linearGradient>
    <!-- Perspective grid: clearly readable lines, faded out toward the left lockup. -->
    <pattern id="grid" width="92" height="92" patternUnits="userSpaceOnUse">
      <path d="M92 0H0V92" fill="none" stroke="#3a4d68" stroke-width="1.4" stroke-opacity="0.55"/>
    </pattern>
    <linearGradient id="gridfadeX" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#fff" stop-opacity="0"/>
      <stop offset="30%" stop-color="#fff" stop-opacity="0.15"/>
      <stop offset="66%" stop-color="#fff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0.85"/>
    </linearGradient>
    <radialGradient id="gridfade" cx="68%" cy="38%" r="66%">
      <stop offset="0%"  stop-color="#fff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <mask id="gridmask">
      <rect width="1920" height="1080" fill="url(#gridfade)"/>
      <rect width="1920" height="1080" fill="url(#gridfadeX)" style="mix-blend-mode:multiply"/>
    </mask>
    <radialGradient id="node" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#7cc6ff" stop-opacity="0.9"/>
      <stop offset="55%" stop-color="#4fb3ff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#4fb3ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1920" height="1080" fill="#080b11"/>
  <rect width="1920" height="1080" fill="url(#wash)"/>
  <rect width="1920" height="1080" fill="url(#grid)" mask="url(#gridmask)"/>
  <rect width="1920" height="1080" fill="url(#beam)"/>

  <!-- Large soft depth blobs lifting the right two-thirds. -->
  <g>
    <circle cx="1500" cy="300" r="300" fill="url(#node)" opacity="0.55"/>
    <circle cx="1230" cy="760" r="220" fill="url(#node)" opacity="0.4"/>
    <circle cx="1760" cy="640" r="170" fill="#ffb23f" opacity="0.07"/>
  </g>

  <!-- A nodes-and-links constellation: reads as "process / pipeline" in the right field.
       Lines first (behind), then nodes. All concentrated x>900 so the left lockup stays
       clean and the right two-thirds carries the composed structure. -->
  <g stroke="#5aa9e8" stroke-width="2" stroke-opacity="0.5" fill="none">
    <path d="M980 250 L1240 360 L1520 250 L1700 430"/>
    <path d="M1240 360 L1360 600 L1180 780"/>
    <path d="M1360 600 L1640 700 L1760 500"/>
    <path d="M1520 250 L1640 700"/>
    <path d="M1180 780 L1480 860"/>
  </g>
  <g fill="#9ed3ff">
    <circle cx="980"  cy="250" r="9"  fill-opacity="0.85"/>
    <circle cx="1240" cy="360" r="12" fill-opacity="0.95"/>
    <circle cx="1520" cy="250" r="9"  fill-opacity="0.8"/>
    <circle cx="1700" cy="430" r="8"  fill-opacity="0.75"/>
    <circle cx="1360" cy="600" r="14" fill="#ffd089" fill-opacity="0.95"/>
    <circle cx="1180" cy="780" r="9"  fill-opacity="0.8"/>
    <circle cx="1640" cy="700" r="11" fill-opacity="0.85"/>
    <circle cx="1760" cy="500" r="8"  fill-opacity="0.7"/>
    <circle cx="1480" cy="860" r="9"  fill-opacity="0.75"/>
  </g>
</svg>
